<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tesla Products</title>
<style>
  :root {
    --card: #161821;
    --card-2: #1d2030;
    --panel: rgba(255,255,255,0.025);
    --panel-border: rgba(255,255,255,0.05);
    --fg: #f3f4f6;
    --muted: #9aa0ae;
    --accent: #22c55e;
    --accent-dim: #86efac;
    --warn: #f59e0b;
    --danger: #ef4444;
    --info: #60a5fa;
    --ring-bg: #2a2e3d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg);
    padding: 28px 30px;
    min-height: 100vh;
  }
  .card {
    background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
    border-radius: 18px;
    padding: 10px !important;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
  }

  .header { display: flex; align-items: baseline; justify-content: space-between; padding: 8px 10px 14px; }
  .title { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
  .count { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .list { display: flex; flex-direction: column; gap: 8px; }

  .item {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 14px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .icon-box {
    width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    background: rgba(255,255,255,0.04);
  }
  .icon-box.vehicle { background: rgba(96,165,250,0.12); color: var(--info); }
  .icon-box.energy { background: rgba(34,197,94,0.12); color: var(--accent); }

  .item-body { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px; font-weight: 600; letter-spacing: -0.2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-sub {
    font-size: 11px; color: var(--muted); margin-top: 3px;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .item-sub .dot { opacity: 0.4; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; }

  .pill {
    padding: 3px 9px; border-radius: 999px; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px;
    background: #2a2e3d; color: var(--muted);
    flex-shrink: 0;
  }
  .pill.online { background: rgba(34,197,94,0.15); color: var(--accent); }
  .pill.asleep { background: rgba(245,158,11,0.15); color: var(--warn); }
  .pill.offline { background: rgba(239,68,68,0.15); color: var(--danger); }
  .pill.info { background: rgba(96,165,250,0.15); color: var(--info); }

  /* Energy side stats */
  .energy-stats { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .mini-ring { position: relative; width: 42px; height: 42px; }
  .mini-ring svg { transform: rotate(-90deg); }
  .mini-ring circle.bg { stroke: var(--ring-bg); }
  .mini-ring circle.fg { stroke: var(--accent); stroke-linecap: round; }
  .mini-ring .pct {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }

  .empty { color: var(--muted); text-align: center; padding: 28px 12px; }
  .error {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5; padding: 12px; border-radius: 10px; font-size: 13px;
  }
</style>
</head>
<body>
<div id="root" class="card"><div class="empty">Loading products…</div></div>

<script>
(function () {
  "use strict";

  const root = document.getElementById("root");

  // Support both Anthropic/Claude (window.claude) and OpenAI/ChatGPT (window.openai) widget runtimes.
  function clientApi() { return (typeof window !== "undefined" && (window.claude || window.openai)) || null; }
  function getToolOutput() { const a = clientApi(); return (a && a.toolOutput) || null; }

  function unwrap(payload) {
    if (!payload) return null;
    if (Array.isArray(payload)) return payload;
    if (Array.isArray(payload.response)) return payload.response;
    if (payload.response && typeof payload.response === "object") return [payload.response];
    return null;
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }

  function maskVin(vin) {
    if (!vin || typeof vin !== "string" || vin.length < 6) return vin || "";
    return `${vin.slice(0, 3)}…${vin.slice(-4)}`;
  }

  function miniRing(pct) {
    const r = 16, c = 2 * Math.PI * r;
    const offset = c * (1 - Math.max(0, Math.min(100, pct)) / 100);
    return `
      <svg width="42" height="42" viewBox="0 0 42 42">
        <circle class="bg" cx="21" cy="21" r="${r}" fill="none" stroke-width="4"/>
        <circle class="fg" cx="21" cy="21" r="${r}" fill="none" stroke-width="4"
                stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
      </svg>`;
  }

  function isVehicle(p) {
    return p && (p.device_type === "vehicle" || p.vin || p.vehicle_id);
  }
  function isEnergy(p) {
    return p && (p.device_type === "energy" || p.energy_site_id);
  }

  function renderVehicle(v) {
    const name = v.display_name || "Vehicle";
    const state = String(v.state || "unknown").toLowerCase();
    const stateClass = state === "online" ? "online" : state === "asleep" ? "asleep" : "offline";
    const vin = maskVin(v.vin);
    const access = v.access_type ? String(v.access_type).toLowerCase() : null;

    const subParts = [];
    if (vin) subParts.push(`<span class="mono">${escapeHtml(vin)}</span>`);
    if (access) {
      if (subParts.length) subParts.push(`<span class="dot">·</span>`);
      subParts.push(`<span>${escapeHtml(access)}</span>`);
    }
    if (v.in_service) {
      if (subParts.length) subParts.push(`<span class="dot">·</span>`);
      subParts.push(`<span>in service</span>`);
    }

    return `
      <div class="item">
        <div class="icon-box vehicle">🚗</div>
        <div class="item-body">
          <div class="item-name">${escapeHtml(name)}</div>
          <div class="item-sub">${subParts.join(" ")}</div>
        </div>
        <div class="pill ${stateClass}">${escapeHtml(state)}</div>
      </div>`;
  }

  function renderEnergy(e) {
    const name = e.site_name || "Energy site";
    const type = e.resource_type ? String(e.resource_type) : "energy";
    const gateway = e.gateway_id ? String(e.gateway_id).slice(-8) : null;

    const subParts = [`<span>${escapeHtml(type)}</span>`];
    if (gateway) {
      subParts.push(`<span class="dot">·</span>`);
      subParts.push(`<span class="mono">GW …${escapeHtml(gateway)}</span>`);
    }

    const pct = typeof e.percentage_charged === "number" ? e.percentage_charged : null;
    const powerKw = typeof e.battery_power === "number" ? (e.battery_power / 1000) : null;

    let right = `<div class="pill info">${escapeHtml(type)}</div>`;
    if (pct != null) {
      const powerLabel = powerKw != null ? `${powerKw.toFixed(1)} kW` : "";
      right = `
        <div class="energy-stats">
          ${powerLabel ? `<div class="pill info">${escapeHtml(powerLabel)}</div>` : ""}
          <div class="mini-ring">
            ${miniRing(pct)}
            <div class="pct">${Math.round(pct)}%</div>
          </div>
        </div>`;
    }

    return `
      <div class="item">
        <div class="icon-box energy">🔋</div>
        <div class="item-body">
          <div class="item-name">${escapeHtml(name)}</div>
          <div class="item-sub">${subParts.join(" ")}</div>
        </div>
        ${right}
      </div>`;
  }

  function renderItem(p) {
    if (isVehicle(p)) return renderVehicle(p);
    if (isEnergy(p)) return renderEnergy(p);
    const label = p.display_name || p.site_name || p.device_type || "Unknown";
    return `
      <div class="item">
        <div class="icon-box">•</div>
        <div class="item-body">
          <div class="item-name">${escapeHtml(label)}</div>
          <div class="item-sub"><span>Unknown device</span></div>
        </div>
      </div>`;
  }

  function render() {
    const raw = getToolOutput();
    if (!raw) { root.innerHTML = `<div class="empty">No products yet.</div>`; return; }
    if (raw && raw.error) { root.innerHTML = `<div class="error">${escapeHtml(raw.error)}</div>`; return; }

    const items = unwrap(raw) || [];
    const count = typeof raw.count === "number" ? raw.count : items.length;

    const vehicles = items.filter(isVehicle).length;
    const energy = items.filter(isEnergy).length;
    const summaryBits = [];
    if (vehicles) summaryBits.push(`${vehicles} vehicle${vehicles > 1 ? "s" : ""}`);
    if (energy) summaryBits.push(`${energy} energy site${energy > 1 ? "s" : ""}`);
    const summary = summaryBits.join(" · ") || `${count} item${count === 1 ? "" : "s"}`;

    if (!items.length) {
      root.innerHTML = `
        <div class="header"><div class="title">Tesla products</div></div>
        <div class="empty">No vehicles or energy sites found.</div>`;
      return;
    }

    root.innerHTML = `
      <div class="header">
        <div class="title">Tesla products</div>
        <div class="count">${escapeHtml(summary)}</div>
      </div>
      <div class="list">
        ${items.map(renderItem).join("")}
      </div>`;
  }

  render();

  const api = clientApi();
  if (api && typeof api.addEventListener === "function") {
    api.addEventListener("toolOutputChanged", render);
    api.addEventListener("widgetStateChanged", render);
  } else {
    let last = JSON.stringify(getToolOutput() || null);
    setInterval(() => {
      const next = JSON.stringify(getToolOutput() || null);
      if (next !== last) { last = next; render(); }
    }, 1000);
  }
})();
</script>
</body>
</html>
