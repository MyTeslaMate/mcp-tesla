<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vehicle Live</title>
<style>
  :root {
    --card: #161821;
    --card-2: #1d2030;
    --panel: rgba(255,255,255,0.025);
    --panel-border: rgba(255,255,255,0.05);
    --fg: #f3f4f6;
    --muted: #9aa0ae;
    --accent: #22c55e;
    --accent-dim: #86efac;
    --warn: #f59e0b;
    --danger: #ef4444;
    --ring-bg: #2a2e3d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg);
    padding: 28px 30px;
    min-height: 100vh;
  }
  .card {
    background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
    border-radius: 18px;
    padding: 26px 28px 22px;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    box-shadow: 0 6px 24px rgba(0,0,0,0.28);
  }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 18px; }
  .title { font-size: 18px; font-weight: 600; line-height: 1.2; letter-spacing: -0.2px; }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .subtitle .dot { opacity: 0.4; }
  .state-pill {
    padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 700;
    background: #2a2e3d; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px;
    flex-shrink: 0;
  }
  .state-pill.online { background: rgba(34,197,94,0.15); color: var(--accent); }
  .state-pill.asleep { background: rgba(245,158,11,0.15); color: var(--warn); }
  .state-pill.offline { background: rgba(239,68,68,0.15); color: var(--danger); }

  /* Sub-panels */
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  /* Hero (battery + range) */
  .hero { display: flex; align-items: center; gap: 20px; }
  .ring { position: relative; width: 104px; height: 104px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring circle.bg { stroke: var(--ring-bg); }
  .ring circle.fg { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
  .ring circle.limit { stroke: var(--muted); stroke-dasharray: 2 4; opacity: 0.45; }
  .ring .pct { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .pct .num { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .ring .pct .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .hero-info { flex: 1; min-width: 0; }
  .hero-info .range { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .hero-info .range small { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 5px; }
  .hero-info .meta { margin-top: 6px; font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .hero-info .meta .dot { opacity: 0.4; }
  .hero-info .charging { color: var(--accent); font-weight: 500; }
  .hero-info .charge-extra { margin-top: 4px; font-size: 11px; color: var(--muted); }

  /* Chips row */
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 11px; border-radius: 999px; font-size: 12px;
    background: rgba(255,255,255,0.04); color: var(--fg);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .chip.on { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.25); color: var(--accent-dim); }
  .chip.warn { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.25); color: var(--warn); }
  .chip.off { color: var(--muted); }
  .chip .icon { font-size: 13px; }

  /* Climate panel (grid) */
  .climate-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    padding: 0;
  }
  .climate-grid.two { grid-template-columns: repeat(2, 1fr); }
  .climate-grid .cell { text-align: center; padding: 2px 8px; position: relative; }
  .climate-grid .cell + .cell { border-left: 1px solid rgba(255,255,255,0.06); }
  .climate-grid .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .climate-grid .v { font-size: 18px; font-weight: 600; margin-top: 4px; letter-spacing: -0.3px; }
  .climate-grid .v.accent { color: var(--accent-dim); }

  /* Location */
  .loc { display: flex; align-items: center; gap: 12px; }
  .loc .pin {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    background: rgba(34,197,94,0.12); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .loc .info { flex: 1; min-width: 0; }
  .loc .info .primary { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .loc .info .secondary { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Tire pressures */
  .tires { padding: 14px 16px; }
  .tires-head { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .tires-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .tire { text-align: center; }
  .tire .pos { font-size: 9px; color: var(--muted); letter-spacing: 0.5px; }
  .tire .val { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .tire.low .val { color: var(--warn); }

  /* Footer */
  .footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 14px; }
  .footer-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .odo { font-size: 12px; color: var(--muted); }
  .ts { font-size: 10px; color: var(--muted); opacity: 0.75; }
  .ts.stale { color: var(--warn); opacity: 1; }
  button {
    background: var(--accent); color: #06240f; border: 0; border-radius: 9px;
    padding: 8px 16px; font-weight: 600; font-size: 12px; cursor: pointer;
    flex-shrink: 0;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .error {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5; padding: 12px; border-radius: 10px; font-size: 13px;
  }
  .empty { color: var(--muted); text-align: center; padding: 24px; }
</style>
</head>
<body>
<div id="root" class="card"><div class="empty">Loading vehicle…</div></div>

<script>
(function () {
  "use strict";

  const root = document.getElementById("root");

  function openai() { return (typeof window !== "undefined" && window.openai) || null; }
  function getToolOutput() { const a = openai(); return (a && a.toolOutput) || null; }
  function getToolInput() { const a = openai(); return (a && a.toolInput) || {}; }

  function unwrap(payload) {
    if (!payload) return null;
    if (payload.response && typeof payload.response === "object") return payload.response;
    return payload;
  }

  function pickState(data) {
    return {
      charge: data.charge_state || {},
      climate: data.climate_state || {},
      drive: data.drive_state || {},
      vehicle: data.vehicle_state || {},
      config: data.vehicle_config || {},
      displayName: data.display_name || data.vehicle_name || "Vehicle",
      state: data.state || "unknown",
      timestamp: (data.charge_state && data.charge_state.timestamp) || null,
    };
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }

  function ringSvg(pct, limit) {
    const r = 46, c = 2 * Math.PI * r;
    const offset = c * (1 - Math.max(0, Math.min(100, pct)) / 100);
    const limitDasharray = limit != null ? `${c * (limit / 100)} ${c}` : null;
    return `
      <svg width="104" height="104" viewBox="0 0 110 110">
        <circle class="bg" cx="55" cy="55" r="${r}" fill="none" stroke-width="8"/>
        ${limitDasharray ? `<circle class="limit" cx="55" cy="55" r="${r}" fill="none" stroke-width="8" stroke-dasharray="${limitDasharray}"/>` : ""}
        <circle class="fg" cx="55" cy="55" r="${r}" fill="none" stroke-width="8" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
      </svg>`;
  }

  function fmtTemp(c) { return (c == null || Number.isNaN(c)) ? "—" : `${Math.round(c)}°C`; }
  function fmtRange(km) { return km == null ? "—" : `${Math.round(km)} <small>km</small>`; }
  function fmtOdo(mi) {
    if (mi == null) return "—";
    return `${Math.round(mi * 1.60934).toLocaleString()} km`;
  }
  function fmtTimeToFull(h) {
    if (!h) return null;
    const hours = Math.floor(h);
    const mins = Math.round((h - hours) * 60);
    if (hours === 0) return `${mins} min to full`;
    return `${hours}h ${mins}m to full`;
  }
  function fmtAge(unixSec) {
    if (!unixSec) return { text: "—", stale: false };
    const ageSec = Math.max(0, Math.round((Date.now() - unixSec) / 1000));
    if (ageSec < 60) return { text: `${ageSec}s ago`, stale: false };
    const mins = Math.round(ageSec / 60);
    return { text: `${mins} min ago`, stale: mins > 2 };
  }
  function psiToBar(psi) { return psi * 0.0689476; }
  function fmtPressure(psi) {
    if (psi == null || psi === 0) return null;
    return `${psiToBar(psi).toFixed(1)}`;
  }
  function fmtCoords(lat, lon) {
    if (lat == null || lon == null) return null;
    const f = (v, pos, neg) => `${Math.abs(v).toFixed(4)}° ${v >= 0 ? pos : neg}`;
    return `${f(lat, "N", "S")}, ${f(lon, "E", "W")}`;
  }

  function render() {
    const api = openai();
    const raw = getToolOutput();
    const data = unwrap(raw);

    if (!data) { root.innerHTML = `<div class="empty">No vehicle data yet.</div>`; return; }
    if (data.error) { root.innerHTML = `<div class="error">${escapeHtml(data.error)}</div>`; return; }

    const s = pickState(data);
    const pct = s.charge.battery_level != null ? s.charge.battery_level : 0;
    const limit = s.charge.charge_limit_soc != null ? s.charge.charge_limit_soc : null;
    const rangeKm = s.charge.battery_range != null ? s.charge.battery_range * 1.60934 : null;
    const estRangeKm = s.charge.est_battery_range != null ? s.charge.est_battery_range * 1.60934 : null;
    const charging = s.charge.charging_state && s.charge.charging_state !== "Disconnected" && s.charge.charging_state !== "Stopped";
    const ttf = charging ? fmtTimeToFull(s.charge.time_to_full_charge) : null;
    const chargerPower = charging && s.charge.charger_power ? `${s.charge.charger_power} kW` : null;
    const chargerDetail = charging && s.charge.charger_voltage && s.charge.charger_actual_current
      ? `${s.charge.charger_voltage} V · ${s.charge.charger_actual_current} A`
      : null;
    const state = (s.state || "unknown").toLowerCase();
    const stateClass = state === "online" ? "online" : state === "asleep" ? "asleep" : "offline";
    const age = fmtAge(s.timestamp);

    const vehicleTag = getToolInput().vehicle_tag || data.id_s || data.id || data.vin;

    // Windows: Tesla API uses fd_window/fp_window/rd_window/rp_window (0 closed, >0 open)
    const windowVals = [s.vehicle.fd_window, s.vehicle.fp_window, s.vehicle.rd_window, s.vehicle.rp_window];
    const windowsKnown = windowVals.some(v => v != null);
    const windowsOpen = windowsKnown && windowVals.some(v => v && v > 0);

    // Doors: df/dr/pf/pr (0 closed, >0 open)
    const doorVals = [s.vehicle.df, s.vehicle.dr, s.vehicle.pf, s.vehicle.pr];
    const doorsKnown = doorVals.some(v => v != null);
    const doorsOpen = doorsKnown && doorVals.some(v => v && v > 0);

    // Software version
    const swVersion = s.vehicle.car_version ? String(s.vehicle.car_version).split(" ")[0] : null;

    // Climate setpoint
    const driverSet = s.climate.driver_temp_setting;

    // Location + shift
    const shift = s.drive.shift_state;
    const parked = !shift || shift === "P";
    const speedMph = s.drive.speed;
    const coords = fmtCoords(s.drive.latitude, s.drive.longitude);

    // Tires (psi fields)
    const tires = [
      { pos: "FL", val: s.vehicle.tpms_pressure_fl },
      { pos: "FR", val: s.vehicle.tpms_pressure_fr },
      { pos: "RL", val: s.vehicle.tpms_pressure_rl },
      { pos: "RR", val: s.vehicle.tpms_pressure_rr },
    ];
    const tiresKnown = tires.some(t => t.val != null && t.val > 0);
    const tireLow = 2.6; // bar threshold

    // ---------- Build HTML ----------
    const chargingLine = charging
      ? `<span class="charging">⚡ ${escapeHtml(s.charge.charging_state || "Charging")}${ttf ? " · " + escapeHtml(ttf) : ""}</span>`
      : `Not charging`;
    const chargePowerLine = chargerPower
      ? `<div class="charge-extra">${escapeHtml(chargerPower)}${chargerDetail ? " · " + escapeHtml(chargerDetail) : ""}</div>`
      : "";
    const limitChip = limit != null ? `<span class="dot">·</span><span>Limit ${limit}%</span>` : "";

    const subtitleParts = [];
    const modelLabel = s.config.car_type || "Tesla";
    subtitleParts.push(escapeHtml(modelLabel));
    if (swVersion) subtitleParts.push(`<span class="dot">·</span><span>v${escapeHtml(swVersion)}</span>`);

    const chipsHtml = `
      <span class="chip ${s.vehicle.locked ? "on" : "warn"}">
        <span class="icon">${s.vehicle.locked ? "🔒" : "🔓"}</span>${s.vehicle.locked ? "Locked" : "Unlocked"}
      </span>
      <span class="chip ${s.vehicle.sentry_mode ? "on" : "off"}">
        <span class="icon">🛡️</span>Sentry ${s.vehicle.sentry_mode ? "on" : "off"}
      </span>
      <span class="chip ${s.climate.is_climate_on ? "on" : "off"}">
        <span class="icon">${s.climate.is_climate_on ? "❄️" : "○"}</span>Climate ${s.climate.is_climate_on ? "on" : "off"}
      </span>
      ${windowsKnown ? `
        <span class="chip ${windowsOpen ? "warn" : "off"}">
          <span class="icon">${windowsOpen ? "🪟" : "▭"}</span>Windows ${windowsOpen ? "open" : "closed"}
        </span>` : ""}
      ${doorsKnown ? `
        <span class="chip ${doorsOpen ? "warn" : "off"}">
          <span class="icon">${doorsOpen ? "🚪" : "▯"}</span>Doors ${doorsOpen ? "open" : "closed"}
        </span>` : ""}
    `;

    const climateHtml = s.climate.is_climate_on && driverSet != null
      ? `<div class="panel">
          <div class="climate-grid">
            <div class="cell"><div class="k">Inside</div><div class="v">${fmtTemp(s.climate.inside_temp)}</div></div>
            <div class="cell"><div class="k">Outside</div><div class="v">${fmtTemp(s.climate.outside_temp)}</div></div>
            <div class="cell"><div class="k">Set to</div><div class="v accent">${fmtTemp(driverSet)}</div></div>
          </div>
         </div>`
      : `<div class="panel">
          <div class="climate-grid two">
            <div class="cell"><div class="k">Inside</div><div class="v">${fmtTemp(s.climate.inside_temp)}</div></div>
            <div class="cell"><div class="k">Outside</div><div class="v">${fmtTemp(s.climate.outside_temp)}</div></div>
          </div>
         </div>`;

    const locHtml = coords
      ? `<div class="panel">
          <div class="loc">
            <div class="pin">${parked ? "🅿" : "🚗"}</div>
            <div class="info">
              <div class="primary">${parked ? "Parked" : `Driving · ${speedMph != null ? Math.round(speedMph * 1.60934) + " km/h" : ""}`}</div>
              <div class="secondary">${escapeHtml(coords)}</div>
            </div>
          </div>
         </div>`
      : "";

    const tiresHtml = tiresKnown
      ? `<div class="panel tires">
          <div class="tires-head"><span>Tire pressure</span><span>bar</span></div>
          <div class="tires-grid">
            ${tires.map(t => {
              const bar = fmtPressure(t.val);
              const low = bar != null && parseFloat(bar) < tireLow;
              return `<div class="tire ${low ? "low" : ""}">
                <div class="pos">${t.pos}</div>
                <div class="val">${bar != null ? bar : "—"}</div>
              </div>`;
            }).join("")}
          </div>
         </div>`
      : "";

    root.innerHTML = `
      <div class="header">
        <div>
          <div class="title">${escapeHtml(s.displayName)}</div>
          <div class="subtitle">${subtitleParts.join(" ")}</div>
        </div>
        <div class="state-pill ${stateClass}">${escapeHtml(state)}</div>
      </div>

      <div class="panel">
        <div class="hero">
          <div class="ring">
            ${ringSvg(pct, limit)}
            <div class="pct"><div class="num">${Math.round(pct)}%</div><div class="lbl">Battery</div></div>
          </div>
          <div class="hero-info">
            <div class="range">${fmtRange(estRangeKm != null ? estRangeKm : rangeKm)}</div>
            <div class="meta">
              <span>${chargingLine}</span>
              ${limitChip}
            </div>
            ${chargePowerLine}
          </div>
        </div>
      </div>

      <div class="chips">${chipsHtml}</div>

      ${climateHtml}
      ${locHtml}
      ${tiresHtml}

      <div class="footer">
        <div class="footer-meta">
          <div class="odo">${fmtOdo(s.vehicle.odometer)}</div>
          <div class="ts ${age.stale ? "stale" : ""}">Updated ${age.text}</div>
        </div>
        <button id="refresh" ${vehicleTag ? "" : "disabled"}>Refresh</button>
      </div>
    `;

    const btn = document.getElementById("refresh");
    if (btn && vehicleTag) {
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        btn.textContent = "Refreshing…";
        try {
          if (api && typeof api.callTool === "function") {
            await api.callTool("get_vehicle_data", { vehicle_tag: vehicleTag });
          }
        } catch (e) {
          root.querySelector(".footer").insertAdjacentHTML(
            "afterbegin",
            `<div class="error" style="margin-bottom:10px">${escapeHtml(String(e.message || e))}</div>`
          );
        } finally {
          btn.disabled = false;
          btn.textContent = "Refresh";
        }
      });
    }
  }

  render();

  const api = openai();
  if (api && typeof api.addEventListener === "function") {
    api.addEventListener("toolOutputChanged", render);
    api.addEventListener("widgetStateChanged", render);
  } else {
    let last = JSON.stringify(getToolOutput() || null);
    setInterval(() => {
      const next = JSON.stringify(getToolOutput() || null);
      if (next !== last) { last = next; render(); }
    }, 1000);
  }
})();
</script>
</body>
</html>
