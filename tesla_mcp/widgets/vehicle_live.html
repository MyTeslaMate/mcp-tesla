<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vehicle Live</title>
<style>
  :root {
    --bg: #0e0f13;
    --card: #161821;
    --card-2: #1d2030;
    --fg: #f3f4f6;
    --muted: #9aa0ae;
    --accent: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --ring-bg: #2a2e3d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg);
    background: transparent;
  }
  .card {
    background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
    border-radius: 16px;
    padding: 18px 20px;
    max-width: 480px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .title { font-size: 17px; font-weight: 600; line-height: 1.2; }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .state-pill {
    padding: 3px 9px; border-radius: 999px; font-size: 10px; font-weight: 700;
    background: #2a2e3d; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px;
    flex-shrink: 0;
  }
  .state-pill.online { background: rgba(34,197,94,0.15); color: var(--accent); }
  .state-pill.asleep { background: rgba(245,158,11,0.15); color: var(--warn); }
  .state-pill.offline { background: rgba(239,68,68,0.15); color: var(--danger); }

  .hero {
    display: flex; align-items: center; gap: 18px;
    padding: 14px; margin-bottom: 14px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px;
  }
  .ring { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring circle.bg { stroke: var(--ring-bg); }
  .ring circle.fg { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
  .ring circle.limit { stroke: var(--muted); stroke-dasharray: 2 4; opacity: 0.45; }
  .ring .pct {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring .pct .num { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .ring .pct .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .hero-info { flex: 1; min-width: 0; }
  .hero-info .range { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  .hero-info .range small { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 4px; }
  .hero-info .meta { margin-top: 4px; font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
  .hero-info .meta .dot { opacity: 0.4; }
  .hero-info .charging { color: var(--accent); font-weight: 500; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px; font-size: 12px;
    background: rgba(255,255,255,0.04); color: var(--fg);
    border: 1px solid rgba(255,255,255,0.05);
  }
  .chip.on { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.25); color: #86efac; }
  .chip.off { color: var(--muted); }
  .chip .icon { font-size: 13px; }

  .temps {
    display: grid; grid-template-columns: 1fr 1px 1fr; gap: 0;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 10px; padding: 10px 0;
    margin-bottom: 14px;
  }
  .temps .cell { text-align: center; padding: 2px 8px; }
  .temps .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .temps .v { font-size: 17px; font-weight: 600; margin-top: 3px; letter-spacing: -0.3px; }
  .temps .sep { background: rgba(255,255,255,0.06); }

  .footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .footer-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .odo { font-size: 12px; color: var(--muted); }
  .ts { font-size: 10px; color: var(--muted); opacity: 0.75; }
  .ts.stale { color: var(--warn); opacity: 1; }
  button {
    background: var(--accent); color: #06240f; border: 0; border-radius: 8px;
    padding: 7px 14px; font-weight: 600; font-size: 12px; cursor: pointer;
    flex-shrink: 0;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: #2a2e3d; color: var(--fg); }

  .error {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5; padding: 12px; border-radius: 10px; font-size: 13px;
  }
  .empty { color: var(--muted); text-align: center; padding: 24px; }
</style>
</head>
<body>
<div id="root" class="card"><div class="empty">Loading vehicle…</div></div>

<script>
(function () {
  "use strict";

  const root = document.getElementById("root");

  function openai() { return (typeof window !== "undefined" && window.openai) || null; }

  function getToolOutput() {
    const api = openai();
    return (api && api.toolOutput) || null;
  }

  function getToolInput() {
    const api = openai();
    return (api && api.toolInput) || {};
  }

  function unwrap(payload) {
    if (!payload) return null;
    if (payload.response && typeof payload.response === "object") return payload.response;
    return payload;
  }

  function pickState(data) {
    return {
      charge: data.charge_state || {},
      climate: data.climate_state || {},
      drive: data.drive_state || {},
      vehicle: data.vehicle_state || {},
      config: data.vehicle_config || {},
      displayName: data.display_name || data.vehicle_name || "Vehicle",
      state: data.state || "unknown",
      timestamp: (data.charge_state && data.charge_state.timestamp) || null,
    };
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }

  function ringSvg(pct, limit) {
    const r = 46, c = 2 * Math.PI * r;
    const offset = c * (1 - Math.max(0, Math.min(100, pct)) / 100);
    const limitAngle = limit != null ? (limit / 100) : null;
    const limitDasharray = limitAngle != null ? `${c * limitAngle} ${c}` : null;
    return `
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle class="bg" cx="55" cy="55" r="${r}" fill="none" stroke-width="8"/>
        ${limitDasharray ? `<circle class="limit" cx="55" cy="55" r="${r}" fill="none" stroke-width="8" stroke-dasharray="${limitDasharray}"/>` : ""}
        <circle class="fg" cx="55" cy="55" r="${r}" fill="none" stroke-width="8"
          stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
      </svg>`;
  }

  function fmtTemp(c) {
    if (c == null || Number.isNaN(c)) return "—";
    return `${Math.round(c)}°C`;
  }

  function fmtRange(km) {
    if (km == null) return "—";
    return `${Math.round(km)} <small>km</small>`;
  }

  function fmtOdo(mi) {
    if (mi == null) return "—";
    const km = mi * 1.60934;
    return `${Math.round(km).toLocaleString()} km`;
  }

  function fmtTimeToFull(h) {
    if (!h) return null;
    const hours = Math.floor(h);
    const mins = Math.round((h - hours) * 60);
    if (hours === 0) return `${mins} min to full`;
    return `${hours}h ${mins}m to full`;
  }

  function fmtAge(unixSec) {
    if (!unixSec) return { text: "—", stale: false };
    const ageMs = Date.now() - unixSec;
    const ageSec = Math.max(0, Math.round(ageMs / 1000));
    if (ageSec < 60) return { text: `${ageSec}s ago`, stale: false };
    const mins = Math.round(ageSec / 60);
    return { text: `${mins} min ago`, stale: mins > 2 };
  }

  function render() {
    const api = openai();
    const raw = getToolOutput();
    const data = unwrap(raw);

    if (!data) {
      root.innerHTML = `<div class="empty">No vehicle data yet.</div>`;
      return;
    }

    if (data.error) {
      root.innerHTML = `<div class="error">${escapeHtml(data.error)}</div>`;
      return;
    }

    const s = pickState(data);
    const pct = s.charge.battery_level != null ? s.charge.battery_level : 0;
    const limit = s.charge.charge_limit_soc != null ? s.charge.charge_limit_soc : null;
    const rangeKm = s.charge.battery_range != null ? s.charge.battery_range * 1.60934 : null;
    const estRangeKm = s.charge.est_battery_range != null ? s.charge.est_battery_range * 1.60934 : null;
    const charging = s.charge.charging_state && s.charge.charging_state !== "Disconnected" && s.charge.charging_state !== "Stopped";
    const ttf = charging ? fmtTimeToFull(s.charge.time_to_full_charge) : null;
    const state = (s.state || "unknown").toLowerCase();
    const stateClass = state === "online" ? "online" : state === "asleep" ? "asleep" : "offline";
    const age = fmtAge(s.timestamp);

    const vehicleTag = getToolInput().vehicle_tag || data.id_s || data.id || data.vin;

    const chargingLine = charging
      ? `<span class="charging">⚡ ${escapeHtml(s.charge.charging_state || "Charging")}${ttf ? " · " + escapeHtml(ttf) : ""}</span>`
      : `Not charging`;
    const limitLine = limit != null ? `<span class="dot">·</span><span>Limit ${limit}%</span>` : "";

    root.innerHTML = `
      <div class="header">
        <div>
          <div class="title">${escapeHtml(s.displayName)}</div>
          <div class="subtitle">${escapeHtml(s.config.car_type || s.vehicle.car_version || "Tesla")}</div>
        </div>
        <div class="state-pill ${stateClass}">${escapeHtml(state)}</div>
      </div>

      <div class="hero">
        <div class="ring">
          ${ringSvg(pct, limit)}
          <div class="pct"><div class="num">${Math.round(pct)}%</div><div class="lbl">Battery</div></div>
        </div>
        <div class="hero-info">
          <div class="range">${fmtRange(estRangeKm != null ? estRangeKm : rangeKm)}</div>
          <div class="meta">
            <span>${chargingLine}</span>
            ${limitLine}
          </div>
        </div>
      </div>

      <div class="chips">
        <span class="chip ${s.vehicle.locked ? "on" : "off"}">
          <span class="icon">${s.vehicle.locked ? "🔒" : "🔓"}</span>${s.vehicle.locked ? "Locked" : "Unlocked"}
        </span>
        <span class="chip ${s.vehicle.sentry_mode ? "on" : "off"}">
          <span class="icon">🛡️</span>Sentry ${s.vehicle.sentry_mode ? "on" : "off"}
        </span>
        <span class="chip ${s.climate.is_climate_on ? "on" : "off"}">
          <span class="icon">${s.climate.is_climate_on ? "❄️" : "○"}</span>Climate ${s.climate.is_climate_on ? "on" : "off"}
        </span>
      </div>

      <div class="temps">
        <div class="cell"><div class="k">Inside</div><div class="v">${fmtTemp(s.climate.inside_temp)}</div></div>
        <div class="sep"></div>
        <div class="cell"><div class="k">Outside</div><div class="v">${fmtTemp(s.climate.outside_temp)}</div></div>
      </div>

      <div class="footer">
        <div class="footer-meta">
          <div class="odo">${fmtOdo(s.vehicle.odometer)}</div>
          <div class="ts ${age.stale ? "stale" : ""}">Updated ${age.text}</div>
        </div>
        <button id="refresh" ${vehicleTag ? "" : "disabled"}>Refresh</button>
      </div>
    `;

    const btn = document.getElementById("refresh");
    if (btn && vehicleTag) {
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        btn.textContent = "Refreshing…";
        try {
          if (api && typeof api.callTool === "function") {
            await api.callTool("get_vehicle_data", { vehicle_tag: vehicleTag });
          }
        } catch (e) {
          root.querySelector(".footer").insertAdjacentHTML(
            "afterbegin",
            `<div class="error" style="margin-bottom:10px">${escapeHtml(String(e.message || e))}</div>`
          );
        } finally {
          btn.disabled = false;
          btn.textContent = "Refresh";
        }
      });
    }
  }

  render();

  const api = openai();
  if (api && typeof api.addEventListener === "function") {
    api.addEventListener("toolOutputChanged", render);
    api.addEventListener("widgetStateChanged", render);
  } else {
    // Fallback for environments that mutate window.openai.toolOutput without events.
    let last = JSON.stringify(getToolOutput() || null);
    setInterval(() => {
      const next = JSON.stringify(getToolOutput() || null);
      if (next !== last) { last = next; render(); }
    }, 1000);
  }
})();
</script>
</body>
</html>
